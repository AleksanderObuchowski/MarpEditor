name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  validate-signing-secrets:
    name: Validate signing secrets
    runs-on: ubuntu-22.04
    steps:
      - name: Check required release signing secrets
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          missing=()
          for name in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_TEAM_ID \
            WINDOWS_CERTIFICATE \
            WINDOWS_CERTIFICATE_PASSWORD
          do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf '⚠️  Warning: signed desktop releases require these missing secrets:\n'
            printf ' - %s\n' "${missing[@]}"
            printf 'Build will continue as unsigned.\n'
          else
            printf '✅ All signing secrets present. Build will be signed.\n'
          fi

  desktop-release:
    name: Build desktop bundles
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
            rustTargets: ""
          - platform: windows-latest
            args: ""
            rustTargets: ""
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rustTargets: "aarch64-apple-darwin,x86_64-apple-darwin"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTargets }}

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Conditionally set signing secrets
        run: |
          if [ -n "${{ secrets.APPLE_CERTIFICATE }}" ]; then
            {
              echo "APPLE_CERTIFICATE=${{ secrets.APPLE_CERTIFICATE }}"
              echo "APPLE_CERTIFICATE_PASSWORD=${{ secrets.APPLE_CERTIFICATE_PASSWORD }}"
              echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}"
              echo "APPLE_ID=${{ secrets.APPLE_ID }}"
              echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}"
              echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}"
            } >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.WINDOWS_CERTIFICATE }}" ]; then
            {
              echo "WINDOWS_CERTIFICATE=${{ secrets.WINDOWS_CERTIFICATE }}"
              echo "WINDOWS_CERTIFICATE_PASSWORD=${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}"
            } >> "$GITHUB_ENV"
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "MarpEditor ${{ github.ref_name }}"
          releaseBody: "Desktop release artifacts for MarpEditor.\n\nInstall via Homebrew: `brew tap ${{ github.repository_owner }}/marpeditor && brew install --cask marpeditor`\nInstall via Scoop: `scoop bucket add marpeditor https://github.com/${{ github.repository_owner }}/scoop-marpeditor && scoop install marpeditor`"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
